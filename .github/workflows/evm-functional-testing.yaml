# SPDX-License-Identifier: Apache-2.0
name: EVM functional testing
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

defaults:
  run:
    shell: bash
permissions:
  contents: read

env:
  SOLO_CLUSTER_NAME: solo-evm-e2e

jobs:
  evm-functional-regression:
    name: EVM Functional Testing (${{ matrix.shard }})
    runs-on: smart-contracts-linux-medium
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: HIP-1215
            test_args: "test/hip-1215/*.test.js"
          - shard: HIP-632
            test_args: "test/hip-632/hip-632.test.js"
          - shard: HTS transfer events
            test_args: "test/hts/transfer-events/transfer-events.test.js"
          - shard: HIP-1340 baseline
            test_args: "test/hip-1340/hip1340-baseline.test.js"
          - shard: HIP-1340 EIP-7702 (solo)
            test_args: "test/hip-1340/hip1340-hts-delegation-noop-value.test.js"
          - shard: HIP-1340 EIP-7702 Ethereum Specific (solo) - delegation setup
            test_args: "test/hip-1340/hip1340-delegation-setup.test.js --grep 'Ethereum Specific tests'"
          - shard: HIP-1340 EIP-7702 Ethereum Specific (solo) - delegated execution
            test_args: "test/hip-1340/hip1340-delegated-execution.test.js --grep 'Ethereum Specific tests'"
          - shard: HIP-1340 EIP-7702 Ethereum Specific (solo) - token and account creation
            test_args: "test/hip-1340/hip1340-token-and-account-creation.test.js --grep 'Ethereum Specific tests'"
          - shard: HIP-1340 Hiero
            test_args: "test/hip-1340/hip1340-hiero.test.js"
          - shard: HIP-1340 SDK tests
            test_args: "test/hip-1340/hip1340-sdk.test.js"
    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00  # v4.7.1
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: step-security/gradle-actions/setup-gradle@c2d874d5f9d267a85a1b5829c6b5a569e33e05c8 # v5.0.0
        with:
          cache-read-only: false

      - name: Setup NodeJS Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Checkout Code
        id: checkout-code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: evm-testing

      - name: Install npm testing dependencies
        run: npm ci
        working-directory: evm-testing/evm-functional-testing

      - name: Install Solo
        run: npm install --global @hashgraph/solo@${SOLO_VERSION}
        env:
          SOLO_VERSION: 0.72.0

      - name: Setup Kind
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          install_only: true
          node_image: kindest/node:v1.32.5@sha256:e3b2327e3a5ab8c76f5ece68936e4cafaa82edf58486b769727ab0b3b97a5b0d
          version: v0.29.0
          kubectl_version: v1.32.5
          verbosity: 3
          wait: 120s

      - name: Checkout Consensus Node
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: hiero-consensus-node
          repository: hiero-ledger/hiero-consensus-node
          # TODO(pectra): Restore main branch, once Pectra feature branch has been merged
          # ref: main
          ref: feature/hedera-evm-pectra-support-v2
          fetch-depth: 0

      - name: Build hiero-consensus-node
        working-directory: ./hiero-consensus-node
        run: '${GRADLE_EXEC} assemble'
        env:
          GRADLE_EXEC: ionice -c 2 -n 2 nice -n 19 ./gradlew

      # TODO(pectra): switch back to release, once Pectra feature branch has been merged
      - name: Checkout Relay
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: hiero-json-rpc-relay
          repository: hiero-ledger/hiero-json-rpc-relay
          ref: pectra-upgrade
          fetch-depth: 0

      - name: Build hiero-json-rpc-relay
        working-directory: ./hiero-json-rpc-relay
        run: 'docker build -t "ghcr.io/hiero-ledger/hiero-json-rpc-relay:0.0.1-local" .'

      - name: Configure and run solo
        id: run_solo
        run: |
          kind create cluster -n "${SOLO_CLUSTER_NAME}"
          solo cluster-ref config connect --cluster-ref kind-${SOLO_CLUSTER_NAME} --context kind-${SOLO_CLUSTER_NAME}
          solo deployment config create -n "${SOLO_NAMESPACE}" --deployment "${SOLO_DEPLOYMENT}"
          solo deployment cluster attach --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-${SOLO_CLUSTER_NAME} --num-consensus-nodes 1
          # consensus node
          solo keys consensus generate --gossip-keys --tls-keys --deployment "${SOLO_DEPLOYMENT}"
          solo cluster-ref config setup -s "${SOLO_CLUSTER_SETUP_NAMESPACE}"
          solo consensus network deploy --deployment "${SOLO_DEPLOYMENT}" --application-properties "${APP_PROPERTIES_PATH}"
          solo consensus node setup --deployment "${SOLO_DEPLOYMENT}" --local-build-path ./hiero-consensus-node/hedera-node/data
          solo consensus node start --deployment "${SOLO_DEPLOYMENT}"
          # mirror node
          if [ -n "${MIRROR_NODE_WEB3_IMAGE}" ]; then
            docker pull "${MIRROR_NODE_WEB3_IMAGE}"
            docker image tag "${MIRROR_NODE_WEB3_IMAGE}" "gcr.io/mirrornode/hedera-mirror-web3:${MIRROR_NODE_VERSION}"
            kind load docker-image "gcr.io/mirrornode/hedera-mirror-web3:${MIRROR_NODE_VERSION}" --name "${SOLO_CLUSTER_NAME}"
          fi
          if [ -n "${MIRROR_NODE_REST_IMAGE}" ]; then
            docker pull ${MIRROR_NODE_REST_IMAGE}
            docker image tag "${MIRROR_NODE_REST_IMAGE}" "gcr.io/mirrornode/hedera-mirror-rest:${MIRROR_NODE_VERSION}"
            kind load docker-image "gcr.io/mirrornode/hedera-mirror-rest:${MIRROR_NODE_VERSION}" --name "${SOLO_CLUSTER_NAME}"
          fi
          if [ -n "${MIRROR_NODE_IMPORTER_IMAGE}" ]; then
            docker pull ${MIRROR_NODE_IMPORTER_IMAGE}
            docker image tag "${MIRROR_NODE_IMPORTER_IMAGE}" "ghcr.io/hiero-ledger/hiero-mirror-node/importer:${MIRROR_NODE_VERSION}"
            kind load docker-image "ghcr.io/hiero-ledger/hiero-mirror-node/importer:${MIRROR_NODE_VERSION}" --name "${SOLO_CLUSTER_NAME}"
          fi
          solo mirror node add --enable-ingress --pinger --mirror-node-version ${MIRROR_NODE_VERSION} --values-file "${MIRROR_NODE_VALUES_PATH}" --deployment "${SOLO_DEPLOYMENT}" --cluster-ref kind-${SOLO_CLUSTER_NAME} 
          # relay
          kind load docker-image "ghcr.io/hiero-ledger/hiero-json-rpc-relay:0.0.1-local" --name "${SOLO_CLUSTER_NAME}"
          solo relay node add --relay-release "0.0.1-local" --deployment "${SOLO_DEPLOYMENT}" -i node1 --dev
          # accounts pre-setup
          solo ledger account create --deployment "${SOLO_DEPLOYMENT}" --dev --hbar-amount "${TEST_ACCOUNT_HBAR_AMOUNT}" --private-key --set-alias --ecdsa-private-key "${TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_1}"
          solo ledger account create --deployment "${SOLO_DEPLOYMENT}" --dev --hbar-amount "${TEST_ACCOUNT_HBAR_AMOUNT}" --private-key --set-alias --ecdsa-private-key "${TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_2}"
          solo ledger account create --deployment "${SOLO_DEPLOYMENT}" --dev --hbar-amount "${TEST_ACCOUNT_HBAR_AMOUNT}" --private-key --set-alias --ecdsa-private-key "${TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_3}"
        env:
          MIRROR_NODE_VERSION: '0.153.0'
          MIRROR_NODE_WEB3_IMAGE: "gcr.io/mirrornode/hedera-mirror-web3:0.156.0-SNAPSHOT"
          MIRROR_NODE_IMPORTER_IMAGE: "gcr.io/mirrornode/hedera-mirror-importer:0.156.0-SNAPSHOT"
          MIRROR_NODE_REST_IMAGE: "gcr.io/mirrornode/hedera-mirror-rest:0.156.0-SNAPSHOT"
          SOLO_NAMESPACE: solo-evm-e2e
          SOLO_DEPLOYMENT: solo-evm-deployment
          SOLO_CLUSTER_SETUP_NAMESPACE: solo-setup
          MIRROR_NODE_VALUES_PATH: "evm-testing/evm-functional-testing/local/mn-values.yaml"
          APP_PROPERTIES_PATH: "evm-testing/evm-functional-testing/local/application.properties"
          # alias f70febf7420398c3892ce79fdc393c1a5487ad27
          TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_1: 3030020100300706052b8104000a04220420de78ff4e5e77ec2bf28ef7b446d4bec66e06d39b6e6967864b2bf3d6153f3e68
          # alias dbe82db504ca6701fbe59e638ceaddbdb691067b
          TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_2: 3030020100300706052b8104000a04220420748634984b480c75456a68ea88f31609cd3091e012e2834948a6da317b727c04
          # alias 84b4d82e6ed64102d0faa6c29bf4e9f541db442f
          TEST_ACCOUNT_ECDSA_PRIVATE_KEY_DER_3: 3030020100300706052b8104000a042204203bcb2fbd18610f44eda2bfd58df63d053e2a6b165617a2ef5e5cca079e0c588a
          TEST_ACCOUNT_HBAR_AMOUNT: 1000000000

      - name: Run the tests
        if: ${{ steps.run_solo.outcome == 'success' }}
        run: npx hardhat test ${{ matrix.test_args }} --network solo
        working-directory: evm-testing/evm-functional-testing

      - name: Stop solo
        if: always()
        run: kind delete cluster -n ${{ env.SOLO_CLUSTER_NAME }}

  hip1340-eip7702-ethereum-hardhat-testing:
    name: HIP-1340 - EIP-7702 Ethereum/Hardhat Testing
    runs-on: smart-contracts-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Setup NodeJS Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Checkout Code
        id: checkout-code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install npm testing dependencies
        run: npm ci
        working-directory: evm-functional-testing

      - name: Run HIP-1340 - EIP-7702 tests against Hardhat local network
        run: npx hardhat test test/hip-1340/hip1340-*.test.js --grep 'Ethereum Specific tests' --network hardhat
        working-directory: evm-functional-testing

  hip1340-eip7702-ethereum-geth-testing:
    name: HIP-1340 - EIP-7702 Ethereum/Geth Testing
    runs-on: smart-contracts-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Setup NodeJS Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Checkout Code
        id: checkout-code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install npm testing dependencies
        run: npm ci
        working-directory: evm-functional-testing

      - name: Start Geth container
        run: docker run --name geth --publish 8545:8545 --detach registry.hub.docker.com/ethereum/client-go:v1.17.1 --dev --verbosity 3 --http --http.api eth --http.addr 0.0.0.0

      - name: Run HIP-1340 - EIP-7702 tests against Geth local network
        run: npx hardhat test test/hip-1340/hip1340-*.test.js --grep 'Ethereum Specific tests' --network geth
        working-directory: evm-functional-testing

      - name: Stop Geth container
        if: always()
        run: docker stop geth

  standard:
    name: Standard
    runs-on: smart-contracts-linux-medium
    needs:
      - evm-functional-regression
    if: ${{ always() }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Validate standard matrix result
        run: |
          if [ "${{ needs.evm-functional-regression.result }}" != "success" ]; then
            echo "Standard matrix result: ${{ needs.evm-functional-regression.result }}"
            exit 1
          fi
