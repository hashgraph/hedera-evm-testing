web3:
  resources:
    requests:
      memory: 300Mi
    limits:
      memory: 600Mi
  env:
  # Needed for transfer events tests gas estimations for 0x16c contract
    HIERO_MIRROR_WEB3_EVM_PROPERTIES_CONTRACTS_SYSTEMCONTRACT_HTS_ADDRESSES: "359,364"
rest:
  env:
    # Needed for EIP-7702 (Pectra) response fields
    HIERO_MIRROR_REST_RESPONSE_ENABLEDELEGATIONADDRESS: "true"
importer:
  resources:
    requests:
      memory: 400Mi
    limits:
      memory: 500Mi
pinger:
  resources:
    requests:
      memory: 100Mi
    limits:
      memory: 150Mi
    